<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Memory Match — Kids Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="game-header">
      <div class="title-block">
        <div class="title-badge">✨</div>
        <div>
          <p class="subtitle">Sweet, safe, and playful</p>
          <h2>Memory Match — Kids Game</h2>
        </div>
      </div>

      <div class="header-controls">
        <button id="new-game" class="primary-button">New Game</button>
        <div class="score-board">
          <div class="score-chip"><span>Moves</span><strong id="moves">0</strong></div>
          <div class="score-chip"><span>Pairs</span><strong id="pairs">0 / 8</strong></div>
          <div class="score-chip"><span>Score</span><strong id="score">0</strong></div>
          <div class="score-chip"><span>High Score</span><strong id="high-score">--</strong></div>
        </div>
      </div>
    </header>

    <main class="game-area">
      <section class="board-shell">
        <div id="board" class="board" aria-label="Memory card matching board"></div>
      </section>
    </main>

    <div class="modal-overlay hidden" id="victory-modal" role="dialog" aria-modal="true" aria-labelledby="victory-title">
      <div class="modal-card">
        <div class="modal-hero">🎊</div>
        <h3 id="victory-title">You matched them all!</h3>
        <p class="modal-copy">Your memory is magical — great job!</p>
        <div class="modal-stats">
          <div><span>Moves</span><strong id="win-moves">0</strong></div>
          <div><span>Final Score</span><strong id="win-score">0</strong></div>
          <div><span>Best Score</span><strong id="win-high-score">--</strong></div>
        </div>
        <button id="modal-replay" class="primary-button">Play Again</button>
      </div>
    </div>

    <div class="confetti-layer" aria-hidden="true"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
